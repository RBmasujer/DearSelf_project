<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dear Self - Customer Dashboard</title>

<link rel="stylesheet" href="../css/customer.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<header>

    <div class="logo">
        Dear Self
    </div>

    <nav>

        <a href="#">Feedback</a>
        <a href="#">Contact Us</a>
        <a href="#">About Us</a>
        <a href="#">Home</a>

            <div class="profile">
                <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="profile">
            </div>

    </nav>

</header>

<!-- MAIN -->

<div class="container">

    <!-- LEFT SIDE -->
    <section class="booking-panel">

        <h1>Customer Dashboard</h1>

        <p class="welcome">
            Welcome to Dear Self
        </p>

        <h2>Nurture your Natural Beauty</h2>

        <div class="booking-content">

            <div class="booking-details">

                <h3>Booking Details</h3>

                <textarea
                    placeholder="Booking information appears here..."
                    readonly>
                </textarea>

            </div>

            <div class="booking-form">

                <select>
                    <option>Add Services</option>
                    <option>Haircut</option>
                    <option>Hair Coloring</option>
                    <option>Massage</option>
                    <option>Pedicure</option>
                    <option>Manicure</option>
                </select>

                <select>
                    <option>Payment Method</option>
                    <option>GCash</option>
                    <option>Maya</option>
                    <option>Cash</option>
                    <option>Credit Card</option>
                </select>

                <select>
                    <option>Choose Staff</option>
                    <option>Staff A</option>
                    <option>Staff B</option>
                    <option>Staff C</option>
                </select>

                <textarea
                    placeholder="Leave feedback">
                </textarea>

                <input type="date">

                <button id="confirmBtn">
                    Confirm Booking
                </button>

            </div>

        </div>

    </section>

    <!-- RIGHT SIDE -->

    <section class="promo-section">

        <div class="promo-overlay">

            <h2>Promos & Services</h2>

            <div class="promo-card">

                <img
                src="https://images.unsplash.com/photo-1562322140-8baeececf3df"
                alt="Salon">

                <h3>Hair Treatment Promo</h3>

                <p>
                    20% OFF this month
                </p>

            </div>

        </div>

    </section>

</div>

<script src="../js/script.js"></script>

</body>
</html>
